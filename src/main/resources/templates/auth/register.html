<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory Registration</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="container">
  <div class="card" style="max-width: 520px; margin: 2rem auto;">
    <h2>Create account</h2>
    <p class="muted">Choose a role and start managing your inventory workflow.</p>

    <form method="post" th:action="@{/web/auth/register}">
      <label for="username">Username</label>
      <input id="username" type="text" name="username" minlength="3" required>

      <label for="email">Email</label>
      <input id="email" type="email" name="email" required>

      <label for="password">Password</label>
      <input id="password" type="password" name="password" minlength="6" required>

      <label for="role">Role</label>
      <select id="role" name="role">
        <option value="BUYER">Buyer</option>
        <option value="SELLER">Seller</option>
        <option value="ADMIN">Admin</option>
      </select>

      <button type="submit">Register</button>
    </form>

    <p class="muted">Already have an account? <a th:href="@{/web/auth/login}">Back to login</a></p>
  </div>
</div>
</body>
</html>
